<!doctype html>
<html lang="{{ACTIVE_LANG}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{APP_NAME}}</title>
<style>
  :root { --bg1:#ffd6e8; --bg2:#ffeef6; --card:rgba(255,255,255,.92); --text:#5f2148; --shadow:0 14px 40px rgba(125,35,84,.18); --btn:#e85a9c; --btn-text:#fff; --smallbtn-bg:#fff7fb; --input-border:#e8bfd2; --rec-shadow:rgba(125,35,84,.08); }
  body.theme-rosa { --bg1:#ffd6e8; --bg2:#ffeef6; --text:#5f2148; --shadow:0 14px 40px rgba(125,35,84,.18); --btn:#e85a9c; --btn-text:#fff; --smallbtn-bg:#fff7fb; --input-border:#e8bfd2; --rec-shadow:rgba(125,35,84,.08); }
  body.theme-lila { --bg1:#e3d6ff; --bg2:#f4eeff; --text:#45216a; --shadow:0 14px 40px rgba(69,33,106,.18); --btn:#9b59b6; --btn-text:#fff; --smallbtn-bg:#faf5ff; --input-border:#d2c4e8; --rec-shadow:rgba(69,33,106,.08); }
  body.theme-blau { --bg1:#d7ebff; --bg2:#eef7ff; --text:#1f4670; --shadow:0 14px 40px rgba(31,70,112,.18); --btn:#3498db; --btn-text:#fff; --smallbtn-bg:#f0f8ff; --input-border:#a8d0f0; --rec-shadow:rgba(31,70,112,.08); }
  body.theme-gruen { --bg1:#d9f7df; --bg2:#effcf1; --text:#24563a; --shadow:0 14px 40px rgba(36,86,58,.15); --btn:#27ae60; --btn-text:#fff; --smallbtn-bg:#f0fff4; --input-border:#a8e6c0; --rec-shadow:rgba(36,86,58,.08); }
  body.theme-regenbogen { --bg1:#ffd6e8; --bg2:#d7ebff; --text:#5f2148; --shadow:0 14px 40px rgba(125,35,84,.18); --btn:#e85a9c; --btn-text:#fff; --smallbtn-bg:#fff7fb; --input-border:#e8bfd2; --rec-shadow:rgba(125,35,84,.08); }
  body.theme-wald { --bg1:#c8e6c9; --bg2:#e8f5e9; --text:#1b5e20; --shadow:0 14px 40px rgba(27,94,32,.15); --btn:#43a047; --btn-text:#fff; --smallbtn-bg:#f1f8e9; --input-border:#a5d6a7; --rec-shadow:rgba(27,94,32,.08); }
  body.theme-weltraum { --bg1:#d1c4e9; --bg2:#ede7f6; --text:#311b92; --shadow:0 14px 40px rgba(49,27,146,.18); --btn:#7e57c2; --btn-text:#fff; --smallbtn-bg:#f3e5f5; --input-border:#b39ddb; --rec-shadow:rgba(49,27,146,.08); }
  body.theme-ocean { --bg1:#b3e5fc; --bg2:#e1f5fe; --text:#01579b; --shadow:0 14px 40px rgba(1,87,155,.18); --btn:#0288d1; --btn-text:#fff; --smallbtn-bg:#e0f7fa; --input-border:#81d4fa; --rec-shadow:rgba(1,87,155,.08); }
  body.theme-dinosaurier { --bg1:#dcedc8; --bg2:#f1f8e9; --text:#33691e; --shadow:0 14px 40px rgba(51,105,30,.15); --btn:#689f38; --btn-text:#fff; --smallbtn-bg:#f9fbe7; --input-border:#aed581; --rec-shadow:rgba(51,105,30,.08); }
  body.theme-baustelle { --bg1:#ffecb3; --bg2:#fff8e1; --text:#e65100; --shadow:0 14px 40px rgba(230,81,0,.15); --btn:#ff9800; --btn-text:#fff; --smallbtn-bg:#fff3e0; --input-border:#ffcc80; --rec-shadow:rgba(230,81,0,.08); }
  body.theme-prinzessin { --bg1:#f8bbd0; --bg2:#fce4ec; --text:#880e4f; --shadow:0 14px 40px rgba(136,14,79,.18); --btn:#ec407a; --btn-text:#fff; --smallbtn-bg:#fff0f5; --input-border:#f48fb1; --rec-shadow:rgba(136,14,79,.08); }
  body.theme-bauernhof { --bg1:#ffcdd2; --bg2:#ffebee; --text:#b71c1c; --shadow:0 14px 40px rgba(183,28,28,.15); --btn:#e53935; --btn-text:#fff; --smallbtn-bg:#fff5f5; --input-border:#ef9a9a; --rec-shadow:rgba(183,28,28,.08); }
  body.theme-katzen { --bg1:#ffe0b2; --bg2:#fff3e0; --text:#e65100; --shadow:0 14px 40px rgba(230,81,0,.12); --btn:#fb8c00; --btn-text:#fff; --smallbtn-bg:#fff8e1; --input-border:#ffcc80; --rec-shadow:rgba(230,81,0,.08); }
  body.theme-hunde { --bg1:#d7ccc8; --bg2:#efebe9; --text:#4e342e; --shadow:0 14px 40px rgba(78,52,46,.15); --btn:#8d6e63; --btn-text:#fff; --smallbtn-bg:#fafafa; --input-border:#bcaaa4; --rec-shadow:rgba(78,52,46,.08); }
  body.theme-wald .tile { border:2px solid #81c784; border-radius:28px; }
  body.theme-weltraum .tile { border-radius:20px; box-shadow:0 0 30px rgba(126,87,194,.15), var(--shadow); }
  body.theme-ocean .tile { border-radius:32px 12px 32px 12px; }
  body.theme-dinosaurier .tile { border:3px dotted #689f38; border-radius:24px; }
  body.theme-baustelle .tile { border-radius:12px; border:3px dashed #ff9800; }
  body.theme-prinzessin .tile { border-radius:40px; box-shadow:0 14px 40px rgba(236,64,122,.2), var(--shadow); }
  body.theme-bauernhof .tile { border:2px solid #e57373; border-radius:28px; }
  body.theme-katzen .tile { border-radius:36px; box-shadow:0 8px 24px rgba(251,140,0,.15), var(--shadow); }
  body.theme-hunde .tile { border-radius:36px; box-shadow:0 8px 24px rgba(141,110,99,.15), var(--shadow); }
  #themeBg { position:fixed; inset:0; z-index:-1; opacity:0; transition:opacity .6s ease; pointer-events:none; background-size:cover; background-position:center; }
  body.theme-wald #themeBg { background-image:url('/themes/forrest.jpg'); opacity:1; }
  body.theme-weltraum #themeBg { background-image:url('/themes/space.jpg'); opacity:1; }
  body.theme-ocean #themeBg { background-image:url('/themes/ocean.jpg'); opacity:1; }
  body.theme-dinosaurier #themeBg { background-image:url('/themes/dinosaur.jpg'); opacity:1; }
  body.theme-baustelle #themeBg { background-image:url('/themes/construction-site.jpg'); opacity:1; }
  body.theme-prinzessin #themeBg { background-image:url('/themes/princess.jpg'); opacity:1; }
  body.theme-bauernhof #themeBg { background-image:url('/themes/farm.jpg'); opacity:1; }
  body.theme-katzen #themeBg { background-image:url('/themes/cats.jpg'); opacity:1; }
  body.theme-hunde #themeBg { background-image:url('/themes/dogs.jpg'); opacity:1; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; font-family:system-ui,sans-serif; background:linear-gradient(180deg,var(--bg1),var(--bg2)); color:var(--text); overflow:hidden; }
  .screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px 80px; }
  .wrap { width:min(1180px,94vw); }
  .titlewrap { height:112px; display:flex; align-items:flex-end; justify-content:center; margin-bottom:22px; }
  h1 { text-align:center; font-size:clamp(2rem,5vw,3.5rem); margin:0; min-height:72px; display:flex; align-items:center; justify-content:center; }
  .grid { display:grid; gap:26px; min-height:430px; }
  .grid.gross { grid-template-columns:repeat(2,minmax(240px,1fr)); grid-template-rows:repeat(2,190px); }
  .grid.klein { grid-template-columns:repeat(3,minmax(180px,1fr)); grid-template-rows:repeat(3,140px); }
  .tile { border:0; border-radius:32px; background:var(--card); box-shadow:var(--shadow); font-weight:700; color:var(--text); cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; width:100%; height:100%; }
  .placeholder { visibility:hidden; pointer-events:none; }
  .grid.gross .tile { font-size:clamp(1.3rem,2.5vw,2rem); }
  .grid.klein .tile { font-size:clamp(1rem,2vw,1.35rem); }
  .grid.gross .emoji { font-size:4rem; }
  .grid.klein .emoji { font-size:2.6rem; }
  .cornerbar { position:fixed; left:20px; right:20px; bottom:18px; display:flex; justify-content:space-between; pointer-events:none; }
  .smallcluster { display:flex; gap:12px; pointer-events:auto; }
  .smallbtn { border:0; border-radius:18px; min-height:54px; min-width:110px; padding:0 18px; font-size:1rem; font-weight:700; background:var(--smallbtn-bg); color:var(--text); box-shadow:var(--shadow); cursor:pointer; }
  .nav { position:fixed; top:50%; transform:translateY(-50%); width:56px; height:120px; border:0; border-radius:22px; background:rgba(255,255,255,.88); box-shadow:var(--shadow); font-size:2rem; font-weight:700; color:var(--text); cursor:pointer; }
  .nav.left { left:14px; }
  .nav.right { right:14px; }
  .hidden { display:none !important; }
  .admin { max-width:1250px; margin:0 auto; }
  #admin .wrap { max-height:calc(100vh - 120px); overflow-y:auto; padding-right:8px; }
  .admin .smallbtn { min-height:40px; min-width:80px; padding:0 12px; font-size:0.9rem; border-radius:12px; }
  .panel { background:rgba(255,255,255,.96); border-radius:24px; box-shadow:var(--shadow); padding:24px; }
  .panel h2 { margin-top:0; margin-bottom:18px; font-size:1.7rem; }
  .row2 { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; margin-bottom:18px; }
  .tileform { display:grid; grid-template-columns:70px 1fr 120px 1.2fr 120px 70px 70px 70px; gap:10px; align-items:center; margin-bottom:12px; }
  .browserWrap { display:none; grid-column:4; grid-row:1; }
  .tileform.has-browser .browserWrap { display:grid; grid-template-columns:1fr 120px; gap:8px; }
  .tileform.has-browser select { display:none; }
  input, select { font-size:1rem; padding:12px 14px; border-radius:12px; border:1px solid var(--input-border); background:white; color:var(--text); width:100%; }
  label.chk { display:flex; align-items:center; gap:8px; font-weight:600; background:white; border:1px solid var(--input-border); border-radius:12px; padding:12px 14px; }
  .save { background:var(--btn); color:var(--btn-text); }
  .pinoverlay { position:fixed; inset:0; background:rgba(0,0,0,.35); display:flex; align-items:center; justify-content:center; z-index:100; }
  .pinbox { background:white; border-radius:24px; padding:32px; max-width:420px; width:90%; box-shadow:var(--shadow); text-align:center; }
  .pinbox h2 { margin:0 0 18px; }
  .pinbox input { text-align:center; font-size:1.5rem; letter-spacing:8px; margin-bottom:12px; }
  .pinbox .err { color:#c00; font-weight:600; min-height:24px; margin-bottom:8px; }
  .pinbox .hint { color:#888; font-size:.9rem; margin-top:12px; }
  .adminpagenav { display:flex; justify-content:center; gap:12px; margin-bottom:14px; }
  .muted { color:#888; font-size:.9rem; }
  .rec-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px; }
  .rec-card { background:white; border-radius:18px; padding:16px; display:flex; flex-direction:column; align-items:center; gap:10px; box-shadow:0 4px 16px var(--rec-shadow); }
  .rec-card .emoji { font-size:2.4rem; }
  .rec-card .name { font-weight:700; font-size:1rem; text-align:center; }
  .rec-card .desc { font-size:.85rem; color:#666; text-align:center; line-height:1.3; }
  .rec-card .status { font-size:.75rem; padding:4px 10px; border-radius:10px; background:#f0f0f0; }
  .rec-card .status.installed { background:#d9f7df; color:#24563a; }
  .rec-card .status.missing { background:#ffeef0; color:#c00; }
  .rec-card .actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .install-overlay { position:fixed; inset:0; background:rgba(0,0,0,.35); display:flex; align-items:center; justify-content:center; z-index:200; }
  .install-box { background:white; border-radius:24px; padding:32px; max-width:480px; width:90%; box-shadow:var(--shadow); text-align:center; }
  .command-box { background:#f5f5f5; border-radius:12px; padding:12px; font-family:monospace; font-size:.9rem; word-break:break-all; margin:12px 0; display:flex; align-items:center; gap:8px; }
  .theme-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:16px; }
  .theme-thumb { border-radius:18px; height:90px; cursor:pointer; border:3px solid transparent; transition:.2s; background-size:cover; background-position:center; position:relative; overflow:hidden; }
  .theme-thumb.active { border-color:var(--btn); box-shadow:0 4px 12px rgba(0,0,0,.15); transform:scale(1.04); }
  .theme-thumb .thumb-label { position:absolute; bottom:0; left:0; right:0; background:rgba(255,255,255,.88); padding:4px 6px; font-size:.78rem; font-weight:700; text-align:center; color:var(--text); }
  #timerBadge { position:fixed; top:18px; right:18px; z-index:50; background:rgba(255,255,255,.92); border-radius:16px; padding:8px 16px; font-weight:700; font-size:1.1rem; color:var(--text); box-shadow:var(--shadow); display:none; }
  #timerBadge.warning { background:#fff3e0; color:#e65100; }
  #timerBadge.expired { background:#ffebee; color:#c00; }
  .timeroverlay { position:fixed; inset:0; background:rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; z-index:250; }
  .timerbox { background:white; border-radius:24px; padding:32px; max-width:420px; width:90%; box-shadow:var(--shadow); text-align:center; }
  .timerbox h2 { margin:0 0 12px; }
  .timerbox .emoji { font-size:3rem; }
  /* Bouncy tile animations */
  @keyframes tileBounce { 0%{transform:scale(1)} 40%{transform:scale(1.06) rotate(1deg)} 100%{transform:scale(1.02)} }
  @keyframes tileWiggle { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-2deg)} 75%{transform:rotate(2deg)} }
  .tile { transition:transform .15s ease, box-shadow .2s ease; }
  .tile:hover { transform:scale(1.05) rotate(1deg); box-shadow:0 20px 50px rgba(125,35,84,.22); }
  .tile:active { transform:scale(.95); }
  .tile.last-launched { animation:tileWiggle .5s ease; box-shadow:0 0 0 4px var(--btn), var(--shadow); }
  .tile .last-star { position:absolute; top:8px; right:8px; font-size:1.4rem; animation:tileBounce 1s ease infinite; }
  /* Start feedback overlay */
  .startoverlay { position:fixed; inset:0; background:rgba(0,0,0,.35); display:flex; align-items:center; justify-content:center; z-index:60; }
  .startbox { background:white; border-radius:28px; padding:40px 48px; box-shadow:var(--shadow); text-align:center; }
  .startbox .emoji { font-size:4rem; animation:tileBounce 1s ease infinite; }
  .startbox h2 { margin:12px 0 0; font-size:1.6rem; color:var(--text); }
  /* Clock & battery badges */
  #clockBadge { position:fixed; top:18px; right:18px; z-index:50; background:rgba(255,255,255,.92); border-radius:16px; padding:8px 14px; font-weight:700; font-size:1rem; color:var(--text); box-shadow:var(--shadow); display:flex; align-items:center; gap:6px; }
  #batteryBadge { position:fixed; top:18px; left:18px; z-index:50; background:rgba(255,255,255,.92); border-radius:16px; padding:8px 14px; font-weight:700; font-size:1rem; color:var(--text); box-shadow:var(--shadow); display:none; align-items:center; gap:4px; }
  /* Empty state */
  .empty-state { grid-column:1 / -1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:40px; }
  .empty-state .emoji { font-size:5rem; }
  .empty-state p { font-size:1.3rem; text-align:center; max-width:500px; }
  /* Admin live preview */
  .preview-panel { position:fixed; top:80px; left:20px; width:200px; background:rgba(255,255,255,.96); border-radius:20px; padding:14px; box-shadow:var(--shadow); z-index:90; max-height:calc(100vh - 200px); overflow-y:auto; }
  .preview-panel h3 { margin:0 0 12px; font-size:1.1rem; }
  .preview-grid { display:grid; gap:8px; }
  .preview-grid.gross { grid-template-columns:repeat(2,1fr); grid-template-rows:repeat(2,60px); }
  .preview-grid.klein { grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,40px); }
  .preview-tile { border-radius:12px; background:var(--card); display:flex; align-items:center; justify-content:center; font-size:.7rem; font-weight:700; color:var(--text); overflow:hidden; padding:2px; text-align:center; }
  @media (max-width:900px) { .preview-panel { display:none; } }
</style>
</head>
<body class="theme-{{DEFAULT_THEME}}">
<div id="themeBg"></div>
<div id="clockBadge"></div>
<div id="batteryBadge"></div>
<div id="timerBadge"></div>
<button id="navLeft" class="nav left hidden" onclick="changePage(-1)">‹</button>
<button id="navRight" class="nav right hidden" onclick="changePage(1)">›</button>
<div id="kids" class="screen">
  <div class="wrap">
    <div class="titlewrap"><h1 id="title"></h1></div>
    <div id="grid" class="grid {{DEFAULT_LAYOUT}}"></div>
  </div>
</div>
<div id="pin" class="pinoverlay hidden">
  <div class="pinbox">
    <h2 id="pinTitle">{{PIN_TITLE}}</h2>
    <input id="pinInput" type="password" inputmode="numeric" maxlength="6" placeholder="{{PIN_PLACEHOLDER}}" onkeydown="if(event.key==='Enter')submitPin()">
    <div class="err" id="pinErr"></div>
    <div style="display:flex;gap:12px;justify-content:center;margin-top:8px;">
      <button class="smallbtn" onclick="cancelPin()">{{LABEL_BACK}}</button>
      <button class="smallbtn save" onclick="submitPin()">OK</button>
    </div>
    <div class="hint" id="pinHint"></div>
  </div>
</div>
<div id="updating" class="pinoverlay hidden">
  <div class="pinbox">
    <div class="emoji" style="font-size:3rem;">🔄</div>
    <h2 id="updateProgressTitle">{{UPDATE_PROGRESS}}</h2>
    <div class="muted" id="updateProgressText"></div>
  </div>
</div>
<div id="installOverlay" class="install-overlay hidden">
  <div class="install-box">
    <h2 id="installTitle"></h2>
    <div id="installMessage"></div>
    <div class="command-box">
      <span id="installCommand"></span>
      <button class="smallbtn" onclick="copyInstallCommand()">{{LABEL_COPY_COMMAND}}</button>
    </div>
    <div id="installHint" class="muted" style="margin-top:12px;"></div>
    <button class="smallbtn" onclick="closeInstallOverlay()">{{LABEL_CLOSE}}</button>
  </div>
</div>
<div id="themeOverlay" class="install-overlay hidden">
  <div class="install-box" style="max-width:900px;">
    <h2 id="themePickerTitle">Theme</h2>
    <div id="themeChooser" class="theme-grid" style="max-height:60vh; overflow-y:auto; padding:8px;"></div>
    <button class="smallbtn" onclick="closeThemePicker()" style="margin-top:12px;">{{LABEL_CLOSE}}</button>
  </div>
</div>
<div id="timerWarning" class="timeroverlay hidden">
  <div class="timerbox">
    <div class="emoji">⏰</div>
    <h2 id="timerWarningTitle"></h2>
    <div class="muted" id="timerWarningText"></div>
  </div>
</div>
<div id="timerBlock" class="timeroverlay hidden">
  <div class="timerbox">
    <div class="emoji">⏰</div>
    <h2>{{TIMER_EXPIRED_TITLE}}</h2>
    <p>{{TIMER_EXPIRED_BODY}}</p>
    <input id="timerBlockPin" type="password" inputmode="numeric" maxlength="6" placeholder="{{PIN_PLACEHOLDER}}" onkeydown="if(event.key==='Enter')extendFromBlock()">
    <div class="err" id="timerBlockErr"></div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:12px;">
      <button class="smallbtn" onclick="extendFromBlock(15)">+15</button>
      <button class="smallbtn" onclick="extendFromBlock(30)">+30</button>
      <button class="smallbtn" onclick="extendFromBlock(60)">+60</button>
    </div>
    <div style="margin-top:12px;">
      <button class="smallbtn" onclick="exitKids()">{{TIMER_EXIT}}</button>
    </div>
  </div>
</div>
<div id="startOverlay" class="startoverlay hidden">
  <div class="startbox">
    <div class="emoji" id="startEmoji">✨</div>
    <h2 id="startText">{{STARTING_APP}}</h2>
  </div>
</div>
<div id="admin" class="screen hidden">
  <div class="wrap admin">
    <div class="panel">
      <h2 id="adminTitle">{{ADMIN_TITLE}}</h2>
      <div class="row2">
        <input id="cfgTitle" placeholder="{{PLACEHOLDER_TITLE}}">
        <input type="hidden" id="cfgTheme">
        <button id="openThemeBtn" class="smallbtn" onclick="openThemePicker()"><span id="themeDisplay"></span></button>
        <select id="cfgLayoutMode"><option value="gross">{{LABEL_LAYOUT_LARGE}}</option><option value="klein">{{LABEL_LAYOUT_SMALL}}</option></select>
        <input id="cfgParentLabel" placeholder="{{PLACEHOLDER_PARENT_LABEL}}">
      </div>
      <div class="row2">
        <input id="cfgExitLabel" placeholder="{{PLACEHOLDER_EXIT_LABEL}}">
        <button id="addTileBtn" class="smallbtn" onclick="addTile()">{{LABEL_ADD_TILE}}</button>
        <button id="backBtn" class="smallbtn" onclick="closeAdmin()">{{LABEL_BACK}}</button>
        <button id="saveBtn" class="smallbtn save" onclick="saveConfig()">{{LABEL_SAVE}}</button>
      </div>
      <div class="row2" style="grid-template-columns:1fr 1fr 1fr 1fr; margin-top:8px;">
        <input id="cfgPin" type="password" inputmode="numeric" maxlength="6" placeholder="{{PIN_SET}}">
        <input id="cfgPinConfirm" type="password" inputmode="numeric" maxlength="6" placeholder="{{PIN_CONFIRM}}">
        <button class="smallbtn" onclick="savePin()">{{PIN_SET}}</button>
        <button class="smallbtn" id="removePinBtn" onclick="removePin()">{{PIN_REMOVE}}</button>
      </div>
      <div id="pinMsg" class="muted"></div>
      <div class="row2" style="grid-template-columns:1fr 1fr 1fr 1fr; margin-top:8px; align-items:center;">
        <label style="font-weight:700; color:var(--text);"><span id="timerLabel"></span></label>
        <select id="cfgTimerMinutes">
          <option value="0">{{TIMER_OFF}}</option>
          <option value="15">15 {{TIMER_MINUTES}}</option>
          <option value="30">30 {{TIMER_MINUTES}}</option>
          <option value="60">60 {{TIMER_MINUTES}}</option>
          <option value="custom">{{TIMER_CUSTOM}}</option>
        </select>
        <input id="cfgTimerCustom" type="number" min="1" max="180" placeholder="Minuten" style="display:none;">
        <button class="smallbtn" id="timerToggleBtn" onclick="toggleTimer()">{{TIMER_START}}</button>
      </div>
      <div id="timerStatus" class="muted"></div>
      <div class="row2" style="grid-template-columns:1fr 1fr; margin-top:8px; align-items:center;">
        <span class="muted" id="versionDisplay"></span>
        <button class="smallbtn" id="checkUpdateBtn" onclick="checkUpdate()">{{UPDATE_CHECK}}</button>

const uiText = {

};
function pageSize(){ return cfg.layoutMode === 'klein' ? 9 : 4; }
function visibleTiles(){ return cfg.tiles.filter(t => t.visible); }
function pageCount(){ return Math.max(1, Math.ceil(visibleTiles().length / pageSize())); }
function tilesForPage(page){ const all=visibleTiles(); const size=pageSize(); return all.slice(page*size, page*size + size); }
async function loadConfig(){ cfg=await fetch('/api/config').then(r=>r.json()); if(typeof cfg.currentPage!=='number') cfg.currentPage=0; renderAll(); }
async function loadApps(){ appOptions=await fetch('/api/apps').then(r=>r.json()); }
async function loadRecommendations(){ try{ const r=await fetch('/api/recommendations'); recommendations=await r.json(); }catch(e){ recommendations=[]; } }
async function loadFeatures(){ try{ const r=await fetch('/api/features'); features=await r.json(); }catch(e){} }
function renderAll(){ document.body.className='theme-'+(cfg.theme||'{{DEFAULT_THEME}}'); document.getElementById('title').textContent=cfg.title||'{{DEFAULT_TITLE}}'; const isAdmin=!document.getElementById('admin').classList.contains('hidden'); document.getElementById('parentBtn').textContent=isAdmin?(uiText.back||'{{LABEL_BACK}}'):(cfg.parentLabel||'{{DEFAULT_PARENT_LABEL}}'); document.getElementById('exitBtn').textContent=cfg.exitLabel||'{{DEFAULT_EXIT_LABEL}}'; const shutdownBtn=document.getElementById('shutdownBtn'); shutdownBtn.textContent=cfg.shutdownLabel||'{{SHUTDOWN_LABEL}}'; shutdownBtn.style.display=features.shutdownAvailable?'':'none'; document.getElementById('grid').className='grid '+(cfg.layoutMode||'{{DEFAULT_LAYOUT}}'); const pc=pageCount(); if(cfg.currentPage>=pc) cfg.currentPage=pc-1; if(cfg.currentPage<0) cfg.currentPage=0; renderKids(); renderAdmin(); renderNav(); }
function renderKids(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  const tiles=tilesForPage(cfg.currentPage);
  const size=pageSize();
  let lastLaunched='';
  try{ lastLaunched=localStorage.getItem('cozyLastLaunched')||''; }catch(e){}
  if(tiles.length===0){
    const empty=document.createElement('div');
    empty.className='empty-state';
    empty.innerHTML='<div class="emoji">'+(uiText.emptyStateEmoji||'🤔')+'</div><p>'+(uiText.emptyStateText||'Frag Mama oder Papa, um Apps hinzuzufügen!')+'</p>';
    grid.appendChild(empty);
    return;
  }
  for(let i=0;i<size;i++){
    if(i<tiles.length){
      const tile=tiles[i];
      const btn=document.createElement('button');
      btn.className='tile'+(tile.id===lastLaunched?' last-launched':'');
      btn.style.position='relative';
      btn.onclick=()=>launchTile(tile.id);
      let html='<div class="emoji">'+(tile.emoji||'✨')+'</div><div>'+(tile.label||'')+'</div>';
      if(tile.id===lastLaunched) html+='<div class="last-star">⭐</div>';
      btn.innerHTML=html;
      grid.appendChild(btn);
    } else {
      const ph=document.createElement('div');
      ph.className='tile placeholder';
      ph.innerHTML='<div class="emoji">✨</div><div></div>';
      grid.appendChild(ph);
    }
  }
}
function renderNav(){ document.getElementById('navLeft').classList.toggle('hidden', cfg.currentPage<=0); document.getElementById('navRight').classList.toggle('hidden', cfg.currentPage>=pageCount()-1); }
function changePage(dir){ cfg.currentPage=Math.max(0,Math.min(pageCount()-1,cfg.currentPage+dir)); renderAll(); }
function showStartFeedback(tile){
  const overlay=document.getElementById('startOverlay');
  const emoji=document.getElementById('startEmoji');
  const text=document.getElementById('startText');
  emoji.textContent=tile.emoji||'✨';
  text.textContent=(uiText.startingApp||'Starte {app}...').replace('{app}',tile.label||'');
  overlay.classList.remove('hidden');
  setTimeout(()=>overlay.classList.add('hidden'),1500);
}
function launchTile(id){
  const tile=cfg.tiles.find(t=>t.id===id);
  if(!tile) return;
  try{ localStorage.setItem('cozyLastLaunched',id); }catch(e){}
  showStartFeedback(tile);
  if(tile.cmd && tile.cmd.length===1 && tile.cmd[0].startsWith('special:browser:')){
    window.location.href='/browser.html?url='+encodeURIComponent(tile.cmd[0].substring('special:browser:'.length));
    return;
  }
  if(tile.cmd && tile.cmd.length===1 && tile.cmd[0].startsWith('special:external-browser:')){
    fetch('/launch/'+encodeURIComponent(id), {method:'POST'}).catch(()=>{});
    return;
  }
  fetch('/launch/'+encodeURIComponent(id), {method:'POST'}).then(r=>{ if(r.redirected) window.location=r.url; }).catch(()=>{});
}

// PIN handling
function handleParentClick(){ if(document.getElementById('admin').classList.contains('hidden')){ openAdmin(); } else { closeAdmin(); } }
function requestPin(callback){ pinCallback=callback; showPin(); }
function openAdmin(){ pinUnlocked=false; if(cfg.pinHash){ requestPin(enterAdmin); return; } enterAdmin(); }
function showPin(){ document.getElementById('pin').classList.remove('hidden'); document.getElementById('pinInput').value=''; document.getElementById('pinErr').textContent=''; document.getElementById('pinInput').focus(); }
function hidePin(){ document.getElementById('pin').classList.add('hidden'); }
function cancelPin(){ hidePin(); document.getElementById('pinInput').value=''; document.getElementById('pinErr').textContent=''; pinCallback=null; }
async function submitPin(){ const val=document.getElementById('pinInput').value; const r=await fetch('/api/verify-pin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:val})}); const data=await r.json(); if(data.valid){ hidePin(); if(pinCallback){ pinCallback(); pinCallback=null; } } else { document.getElementById('pinErr').textContent=uiText.pinWrong; document.getElementById('pinInput').value=''; document.getElementById('pinInput').focus(); } }
function enterAdmin(){ adminPage=cfg.currentPage; document.getElementById('kids').classList.add('hidden'); document.getElementById('admin').classList.remove('hidden'); document.getElementById('parentBtn').textContent=uiText.back||'{{LABEL_BACK}}'; renderAdmin(); }
function closeAdmin(){ document.getElementById('admin').classList.add('hidden'); document.getElementById('kids').classList.remove('hidden'); document.getElementById('parentBtn').textContent=cfg.parentLabel||'{{DEFAULT_PARENT_LABEL}}'; pinUnlocked=false; }
function shutdownNow(){ if(cfg.pinHash){ requestPin(() => { fetch('/shutdown',{method:'POST'}).catch(()=>{}); }); return; } fetch('/shutdown',{method:'POST'}).catch(()=>{}); }
function exitKids(){ if(cfg.pinHash){ requestPin(() => { fetch('/exit-kids',{method:'POST'}).catch(()=>{}); }); return; } fetch('/exit-kids',{method:'POST'}).catch(()=>{}); }
function tilePageIndex(idx){ return Math.floor(idx / pageSize()); }

const ALL_THEMES=[
  {id:'rosa',label:'Rosa',type:'color',gradient:'linear-gradient(180deg,#ffd6e8,#ffeef6)'},
  {id:'lila',label:'Lila',type:'color',gradient:'linear-gradient(180deg,#e3d6ff,#f4eeff)'},
  {id:'blau',label:'Blau',type:'color',gradient:'linear-gradient(180deg,#d7ebff,#eef7ff)'},
  {id:'gruen',label:'Grün',type:'color',gradient:'linear-gradient(180deg,#d9f7df,#effcf1)'},
  {id:'regenbogen',label:'Regenbogen',type:'color',gradient:'linear-gradient(180deg,#ffd6e8,#d7ebff)'},
  {id:'wald',label:'Wald',type:'world',img:'/themes/forrest.jpg'},
  {id:'weltraum',label:'Weltraum',type:'world',img:'/themes/space.jpg'},
  {id:'ocean',label:'Ocean',type:'world',img:'/themes/ocean.jpg'},
  {id:'dinosaurier',label:'Dinosaurier',type:'world',img:'/themes/dinosaur.jpg'},
  {id:'baustelle',label:'Baustelle',type:'world',img:'/themes/construction-site.jpg'},
  {id:'prinzessin',label:'Prinzessin',type:'world',img:'/themes/princess.jpg'},
  {id:'bauernhof',label:'Bauernhof',type:'world',img:'/themes/farm.jpg'},
  {id:'katzen',label:'Katzen',type:'world',img:'/themes/cats.jpg'},
  {id:'hunde',label:'Hunde',type:'world',img:'/themes/dogs.jpg'}
];
function openThemePicker(){ document.getElementById('themeOverlay').classList.remove('hidden'); renderThemeChooser(); }
function closeThemePicker(){ document.getElementById('themeOverlay').classList.add('hidden'); updateThemeDisplay(); }
function updateThemeDisplay(){ const id=document.getElementById('cfgTheme').value; const t=ALL_THEMES.find(x=>x.id===id); document.getElementById('themeDisplay').textContent=t?t.label:id; }
function renderThemeChooser(){
  const container=document.getElementById('themeChooser');
  const current=document.getElementById('cfgTheme').value;
  container.innerHTML='';
  for(const t of ALL_THEMES){
    const el=document.createElement('div');
    el.className='theme-thumb'+(t.id===current?' active':'');
    el.style.background=t.type==='color'?t.gradient:'url('+t.img+') center/cover no-repeat';
    el.onclick=()=>{ document.getElementById('cfgTheme').value=t.id; renderThemeChooser(); closeThemePicker(); };
    const lbl=document.createElement('div');
    lbl.className='thumb-label';
    lbl.textContent=t.label;
    el.appendChild(lbl);
    container.appendChild(el);
  }
}

// PIN setup
async function savePin(){ const p1=document.getElementById('cfgPin').value; const p2=document.getElementById('cfgPinConfirm').value; const msg=document.getElementById('pinMsg'); msg.textContent=''; msg.style.color=''; if(!p1){ msg.textContent=uiText.pinMismatch; msg.style.color='#c00'; return; } if(p1!==p2){ msg.textContent=uiText.pinMismatch; msg.style.color='#c00'; return; } if(!/^\d{4,6}$/.test(p1)){ msg.textContent='4-6 digits'; msg.style.color='#c00'; return; } const hash=await sha256(p1); cfg.pinHash=hash; await fetch('/api/save-config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)}); msg.textContent=uiText.pinSaved; msg.style.color='green'; document.getElementById('cfgPin').value=''; document.getElementById('cfgPinConfirm').value=''; updatePinButton(); }
async function removePin(){ const msg=document.getElementById('pinMsg'); msg.textContent=''; msg.style.color=''; cfg.pinHash=''; await fetch('/api/save-config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)}); msg.textContent=uiText.pinRemoved; msg.style.color='green'; updatePinButton(); }
function updatePinButton(){ const btn=document.getElementById('removePinBtn'); btn.textContent=cfg.pinHash?uiText.pinChange:uiText.pinRemove; btn.style.opacity=cfg.pinHash?1:.5; }
async function sha256(str){ const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str)); return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').substring(0,16); }

// Update check
let installedVersion='0.0.0';
async function checkUpdate(){ const btn=document.getElementById('checkUpdateBtn'); const msg=document.getElementById('updateMsg'); const updateRow=document.getElementById('updateRow'); msg.textContent=''; msg.style.color=''; updateRow.style.display='none'; btn.disabled=true; try{ const localR=await fetch('/api/version'); const localData=await localR.json(); installedVersion=localData.version||'0.0.0'; document.getElementById('versionDisplay').textContent=(uiText.versionLabel||'Version')+': '+installedVersion; const remoteR=await fetch('https://raw.githubusercontent.com/TrissyGE/cozy-kids-launcher/main/VERSION?nocache='+Date.now(),{cache:'no-store'}); if(!remoteR.ok) throw new Error('fetch failed'); const remoteVersion=(await remoteR.text()).trim(); if(compareVersion(remoteVersion,installedVersion)>0){ msg.textContent=(uiText.updateAvailable||'Update available')+': '+remoteVersion; msg.style.color='green'; updateRow.style.display='grid'; } else { msg.textContent=uiText.updateUpToDate||'Up to date'; msg.style.color='green'; } } catch(e){ msg.textContent=uiText.updateError||'Update check failed'; msg.style.color='#c00'; } finally { btn.disabled=false; } }
function compareVersion(a,b){ const A=a.split('.'); const B=b.split('.'); for(let i=0;i<Math.max(A.length,B.length);i++){ const av=parseInt(A[i]||0,10); const bv=parseInt(B[i]||0,10); if(av>bv) return 1; if(av<bv) return -1; } return 0; }
async function installUpdate(){ if(!window.confirm(uiText.updateConfirm||'Close browser and install update now?')) return; try{ await fetch('/api/update',{method:'POST'}); }catch(e){} document.getElementById('updating').classList.remove('hidden'); setTimeout(()=>{ fetch('/exit-kids',{method:'POST'}).catch(()=>{}); }, 3000); }

function renderAdmin(){
  document.getElementById('adminTitle').textContent=uiText.adminTitle;
  document.getElementById('cfgTitle').placeholder=uiText.placeholderTitle;
  document.getElementById('cfgParentLabel').placeholder=uiText.placeholderParentLabel;
  document.getElementById('cfgExitLabel').placeholder=uiText.placeholderExitLabel;
  document.getElementById('addTileBtn').textContent=uiText.addTile;
  document.getElementById('backBtn').textContent=uiText.back;
  document.getElementById('saveBtn').textContent=uiText.save;
  document.getElementById('cfgTitle').value=cfg.title||'';
  document.getElementById('cfgTheme').value=cfg.theme||'{{DEFAULT_THEME}}';
  updateThemeDisplay();
  document.getElementById('cfgLayoutMode').value=cfg.layoutMode||'{{DEFAULT_LAYOUT}}';
  document.getElementById('cfgParentLabel').value=cfg.parentLabel||'{{DEFAULT_PARENT_LABEL}}';
  document.getElementById('cfgExitLabel').value=cfg.exitLabel||'{{DEFAULT_EXIT_LABEL}}';
  document.getElementById('checkUpdateBtn').textContent=uiText.updateCheck||'Check for updates';
  document.getElementById('versionDisplay').textContent=(uiText.versionLabel||'Version')+': '+installedVersion;
  document.getElementById('updateMsg').textContent='';
  updatePinButton();
  // Timer admin
  document.getElementById('timerLabel').textContent=uiText.timerLabel||'Bildschirmzeit';
  const timerSel=document.getElementById('cfgTimerMinutes');
  const timerCustom=document.getElementById('cfgTimerCustom');
  const minutes=cfg.timerMinutes||0;
  if([15,30,60].includes(minutes)){
    timerSel.value=String(minutes);
    timerCustom.style.display='none';
  }else if(minutes>0){
    timerSel.value='custom';
    timerCustom.value=String(minutes);
    timerCustom.style.display='';
  }else{
    timerSel.value='0';
    timerCustom.style.display='none';
  }
  timerSel.onchange=function(){
    timerCustom.style.display=timerSel.value==='custom'?'':'none';
  };
  const timerBtn=document.getElementById('timerToggleBtn');
  if(lastTimerStatus.active&&!lastTimerStatus.expired){
    timerBtn.textContent=uiText.timerStop||'Stop';
    document.getElementById('timerStatus').textContent=(uiText.timerRemaining||'Noch {time}').replace('{time}',formatTime(lastTimerStatus.remainingSeconds));
  }else{
    timerBtn.textContent=uiText.timerStart||'Start';
    document.getElementById('timerStatus').textContent='';
  }
  const forms=document.getElementById('forms');
  forms.innerHTML='';
  cfg.tiles.forEach((tile, idx)=>{
    const row=document.createElement('div');
    row.className='tileform';
    row.style.display = tilePageIndex(idx) === adminPage ? 'grid' : 'none';
    const emoji=document.createElement('input');
    emoji.value=tile.emoji||'';
    emoji.onchange=e=>tile.emoji=e.target.value;
    const label=document.createElement('input');
    label.value=tile.label||'';
    label.onchange=e=>tile.label=e.target.value;
    const visibleWrap=document.createElement('label');
    visibleWrap.className='chk';
    const visible=document.createElement('input');
    visible.type='checkbox';
    visible.checked=!!tile.visible;
    visible.onchange=e=>tile.visible=e.target.checked;
    visibleWrap.append(visible,' '+uiText.visible);
    const select=document.createElement('select');
    const special=document.createElement('option');
    special.value='special:filme-musik';
    special.textContent=uiText.specialMedia;
    select.appendChild(special);
    const browserOpt=document.createElement('option');
    browserOpt.value='__BROWSER__';
    browserOpt.textContent='🌐 Browser-Seite';
    select.appendChild(browserOpt);
    const empty=document.createElement('option');
    empty.value='';
    empty.textContent=uiText.noApp;
    select.appendChild(empty);
    for(const app of appOptions){
      const opt=document.createElement('option');
      opt.value=app.exec;
      opt.textContent=app.name;
      select.appendChild(opt);
    }

    const browserWrap=document.createElement('div');
    browserWrap.className='browserWrap';
    const urlInput=document.createElement('input');
    urlInput.placeholder='https://...';
    const typeSelect=document.createElement('select');
    const optEmb=document.createElement('option');
    optEmb.value='embedded';
    optEmb.textContent='Eingebettet';
    const optExt=document.createElement('option');
    optExt.value='external';
    optExt.textContent='Extern (DRM)';
    typeSelect.appendChild(optEmb);
    typeSelect.appendChild(optExt);
    browserWrap.appendChild(urlInput);
    browserWrap.appendChild(typeSelect);

    let currentExec=Array.isArray(tile.cmd)?tile.cmd.join(' '):'';
    let isBrowser=false, browserUrl='', browserType='embedded';
    if(currentExec.startsWith('special:browser:')){
      isBrowser=true;
      browserUrl=currentExec.substring('special:browser:'.length);
      currentExec='__BROWSER__';
    }else if(currentExec.startsWith('special:external-browser:')){
      isBrowser=true;
      browserUrl=currentExec.substring('special:external-browser:'.length);
      currentExec='__BROWSER__';
      browserType='external';
    }
    select.value=currentExec;
    if(isBrowser){
      row.classList.add('has-browser');
      urlInput.value=browserUrl;
      typeSelect.value=browserType;
    }
    if(select.value!==currentExec){
      const opt=document.createElement('option');
      opt.value=currentExec;
      opt.textContent=currentExec||uiText.customCmd;
      opt.selected=true;
      select.appendChild(opt);
    }

    select.onchange=e=>{
      if(e.target.value==='__BROWSER__'){
        row.classList.add('has-browser');
        urlInput.value='';
        typeSelect.value='embedded';
      }else{
        row.classList.remove('has-browser');
        tile.cmd=[e.target.value];
      }
    };

    function updateBrowserCmd(){
      const u=urlInput.value.trim();
      if(!u) return;
      if(typeSelect.value==='external'){
        tile.cmd=['special:external-browser:'+u];
      }else{
        tile.cmd=['special:browser:'+u];
      }
    }
    urlInput.onchange=updateBrowserCmd;
    typeSelect.onchange=updateBrowserCmd;

    const up=document.createElement('button');
    up.className='smallbtn';
    up.textContent=uiText.moveUp;
    up.onclick=()=>moveUp(idx);
    const down=document.createElement('button');
    down.className='smallbtn';
    down.textContent=uiText.moveDown;
    down.onclick=()=>moveDown(idx);
    const del=document.createElement('button');
    del.className='smallbtn';
    del.textContent=uiText.delete;
    del.onclick=()=>deleteTile(idx);
    row.append(emoji,label,visibleWrap,select,browserWrap,up,down,del);
    forms.appendChild(row);
  });
  renderAdminPageNav();
  renderRecommendations();
  renderPreview();
}
function moveUp(idx){ if(idx<1) return; const tmp=cfg.tiles[idx-1]; cfg.tiles[idx-1]=cfg.tiles[idx]; cfg.tiles[idx]=tmp; renderAdmin(); }
function moveDown(idx){ if(idx>=cfg.tiles.length-1) return; const tmp=cfg.tiles[idx+1]; cfg.tiles[idx+1]=cfg.tiles[idx]; cfg.tiles[idx]=tmp; renderAdmin(); }
function deleteTile(idx){ cfg.tiles.splice(idx,1); if(cfg.tiles.length===0) addTile(); renderAll(); }
function addTile(){ cfg.tiles.push({ id:'tile-'+Date.now(), label:uiText.newTile, emoji:'✨', cmd:[''], visible:true }); renderAll(); adminPage=pageCount()-1; renderAdmin(); }
function renderAdminPageNav(){ const nav=document.getElementById('adminPageNav'); nav.innerHTML=''; const pages=Math.max(1, Math.ceil(cfg.tiles.length / pageSize())); if(pages<=1) return; const prev=document.createElement('button'); prev.className='smallbtn'; prev.textContent=uiText.adminPagePrev; prev.onclick=()=>{ adminPage=Math.max(0,adminPage-1); renderAdmin(); }; prev.disabled=adminPage<=0; nav.appendChild(prev); const info=document.createElement('span'); info.className='muted'; info.textContent=(adminPage+1)+' / '+pages; nav.appendChild(info); const next=document.createElement('button'); next.className='smallbtn'; next.textContent=uiText.adminPageNext; next.onclick=()=>{ adminPage=Math.min(pages-1,adminPage+1); renderAdmin(); }; next.disabled=adminPage>=pages-1; nav.appendChild(next); }
function renderRecommendations(){
  const container=document.getElementById('recommendations');
  container.innerHTML='';
  if(!recommendations.length) return;
  const existingIds=new Set(cfg.tiles.map(t=>t.id));
  const existingCmds=new Set(cfg.tiles.map(t=>JSON.stringify(t.cmd||[])));
  const panel=document.createElement('div'); panel.className='panel';
  const headerRow=document.createElement('div'); headerRow.style.display='flex'; headerRow.style.justifyContent='space-between'; headerRow.style.alignItems='center'; headerRow.style.marginBottom='12px';
  const h2=document.createElement('h2'); h2.style.margin='0'; h2.textContent=uiText.appBrowserTitle||'App Browser';
  const refreshBtn=document.createElement('button'); refreshBtn.className='smallbtn'; refreshBtn.textContent='↻'; refreshBtn.title='Refresh'; refreshBtn.onclick=async()=>{ await loadRecommendations(); renderRecommendations(); };
  headerRow.appendChild(h2); headerRow.appendChild(refreshBtn);
  panel.appendChild(headerRow);
  const grid=document.createElement('div'); grid.className='rec-grid';
  const sorted=[...recommendations].sort((a,b)=>{
    const aAdded=existingIds.has(a.id)||existingCmds.has(JSON.stringify(a.cmd||[]));
    const bAdded=existingIds.has(b.id)||existingCmds.has(JSON.stringify(b.cmd||[]));
    if(aAdded!==bAdded) return aAdded?1:-1;
    if(a.installed!==b.installed) return a.installed?-1:1;
    return 0;
  });
  for(const rec of sorted){
    const card=document.createElement('div'); card.className='rec-card';
    const em=document.createElement('div'); em.className='emoji'; em.textContent=rec.emoji||'✨';
    const nm=document.createElement('div'); nm.className='name';
    nm.textContent=(cfg.language==='de'?rec.name_de:rec.name_en)||(cfg.language==='de'?rec.label_de:rec.label_en)||rec.id;
    const desc=document.createElement('div'); desc.className='desc';
    desc.textContent=(cfg.language==='de'?rec.desc_de:rec.desc_en)||'';
    const st=document.createElement('div'); st.className='status '+(rec.installed?'installed':'missing');
    st.textContent=rec.installed?(uiText.installed||'installed'):(uiText.notInstalled||'not installed');
    const actions=document.createElement('div'); actions.className='actions';
    const added=existingIds.has(rec.id)||existingCmds.has(JSON.stringify(rec.cmd||[]));
    if(added){
      const btn=document.createElement('button'); btn.className='smallbtn'; btn.disabled=true; btn.textContent=uiText.added||'Added';
      actions.appendChild(btn);
    } else if(rec.installed){
      const btn=document.createElement('button'); btn.className='smallbtn'; btn.textContent=uiText.addTile||'Add tile';
      btn.onclick=()=>{ cfg.tiles.push({ id:rec.id, label:(cfg.language==='de'?rec.label_de:rec.label_en)||rec.id, emoji:rec.emoji||'✨', cmd:rec.cmd||[], visible:true }); renderAll(); persistConfig(); };
      actions.appendChild(btn);
    } else {
      const btn=document.createElement('button'); btn.className='smallbtn'; btn.textContent=uiText.install||'Install';
      btn.onclick=()=>{ triggerInstall(rec); };
      actions.appendChild(btn);
    }
    card.append(em,nm,desc,st,actions);
    grid.appendChild(card);
  }
  panel.appendChild(grid);
  const disclaimer=document.createElement('div'); disclaimer.className='muted'; disclaimer.style.marginTop='14px'; disclaimer.style.fontSize='.85rem'; disclaimer.textContent=cfg.language==='de'?'Diese Programme stammen aus externen Quellen und stehen in keiner Verbindung zum Cozy Kids Launcher Projekt.':'This software comes from external sources and is not affiliated with the Cozy Kids Launcher project.';
  panel.appendChild(disclaimer);
  container.appendChild(panel);
}
let pendingInstallCommand='';
function triggerInstall(rec){
  pendingInstallCommand='sudo apt install -y '+rec.package;
  document.getElementById('installTitle').textContent=(uiText.install||'Install')+' '+((cfg.language==='de'?rec.name_de:rec.name_en)||(cfg.language==='de'?rec.label_de:rec.label_en)||rec.id);
  fetch('/api/install-package',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({package:rec.package})})
    .then(r=>r.json()).then(data=>{
      const msg=document.getElementById('installMessage');
      if(data.status==='started'){
        msg.textContent=uiText.installStarted||'Installation started. Watch for a password dialog, or run the command below:';
      } else {
        msg.textContent=uiText.installManual||'Please run this command in a terminal:';
      }
      if(data.command) pendingInstallCommand=data.command;
      document.getElementById('installCommand').textContent=pendingInstallCommand;
      const hint=cfg.language==='de'?rec.hint_de:rec.hint_en;
      const hintEl=document.getElementById('installHint');
      hintEl.textContent=hint||'';
      hintEl.style.display=hint?'block':'none';
      document.getElementById('installOverlay').classList.remove('hidden');
    }).catch(()=>{
      document.getElementById('installMessage').textContent=uiText.installManual||'Please run this command in a terminal:';
      document.getElementById('installCommand').textContent=pendingInstallCommand;
      const hint=cfg.language==='de'?rec.hint_de:rec.hint_en;
      const hintEl=document.getElementById('installHint');
      hintEl.textContent=hint||'';
      hintEl.style.display=hint?'block':'none';
      document.getElementById('installOverlay').classList.remove('hidden');
    });
}
function closeInstallOverlay(){ document.getElementById('installOverlay').classList.add('hidden'); }
async function copyInstallCommand(){
  try{
    await navigator.clipboard.writeText(pendingInstallCommand);
    const btn=document.querySelector('#installOverlay .command-box .smallbtn');
    btn.textContent=uiText.commandCopied||'Copied!';
    setTimeout(()=>btn.textContent=uiText.copyCommand||'Copy',2000);
  }catch(e){}
}
async function autoScanRecommendations(){
  if(cfg.autoScanDone) return;
  const existingIds=new Set(cfg.tiles.map(t=>t.id));
  const existingCmds=new Set(cfg.tiles.map(t=>JSON.stringify(t.cmd||[])));
  let added=false;
  for(const rec of recommendations){
    if(existingIds.has(rec.id)) continue;
    if(rec.installed && !existingCmds.has(JSON.stringify(rec.cmd||[]))){
      cfg.tiles.push({ id:rec.id, label:(cfg.language==='de'?rec.label_de:rec.label_en)||rec.id, emoji:rec.emoji||'✨', cmd:rec.cmd||[], visible:true });
      added=true;
    }
  }
  cfg.autoScanDone=true;
  await persistConfig();
  if(added){ renderAll(); }
}
async function persistConfig(){
  await fetch('/api/save-config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)});
}

// Timer logic
let timerWarningShown=false;
function formatTime(sec){
  const m=Math.max(0,Math.floor(sec/60));
  return m+' {{TIMER_MINUTES}}';
}
async function pollTimer(){
  try{
    const r=await fetch('/api/timer/status');
    const data=await r.json();
    lastTimerStatus=data;
    const badge=document.getElementById('timerBadge');
    if(data.active){
      badge.style.display='block';
      badge.textContent='⏱️ '+formatTime(data.remainingSeconds);
      if(data.expired){
        badge.className='expired';
        badge.textContent='⏰ '+uiText.timerExpired;
        showTimerBlock();
      }else if(data.warning && !timerWarningShown){
        badge.className='warning';
        timerWarningShown=true;
        showTimerWarning(data.remainingSeconds);
      }else if(!data.warning){
        badge.className='';
        hideTimerWarning();
      }
    }else{
      timerWarningShown=false;
      badge.style.display='none';
      hideTimerWarning();
      hideTimerBlock();
    }
  }catch(e){}
}
function showTimerWarning(remaining){
  const el=document.getElementById('timerWarning');
  if(!el.classList.contains('hidden')) return;
  document.getElementById('timerWarningTitle').textContent=uiText.timerWarningTitle||'Noch 5 Minuten!';
  document.getElementById('timerWarningText').textContent=(uiText.timerWarningText||'').replace('{time}',formatTime(remaining));
  el.classList.remove('hidden');
  setTimeout(hideTimerWarning,6000);
}
function hideTimerWarning(){
  document.getElementById('timerWarning').classList.add('hidden');
}
function showTimerBlock(){
  document.getElementById('timerBlock').classList.remove('hidden');
}
function hideTimerBlock(){
  document.getElementById('timerBlock').classList.add('hidden');
  document.getElementById('timerBlockPin').value='';
  document.getElementById('timerBlockErr').textContent='';
}
async function toggleTimer(){
  const btn=document.getElementById('timerToggleBtn');
  if(lastTimerStatus.active && !lastTimerStatus.expired){
    // Stop timer
    const pin=cfg.pinHash?prompt(uiText.pinTitle||'PIN eingeben'):'';
    const r=await fetch('/api/timer/stop',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:pin||''})});
    const data=await r.json();
    if(data.valid){
      timerWarningShown=false;
      btn.textContent=uiText.timerStart;
      document.getElementById('timerStatus').textContent='';
      pollTimer();
    }
  }else{
    // Start timer
    let minutes=parseInt(document.getElementById('cfgTimerMinutes').value,10);
    if(isNaN(minutes)||minutes<=0){
      minutes=parseInt(document.getElementById('cfgTimerCustom').value,10);
    }
    if(isNaN(minutes)||minutes<=0) return;
    cfg.timerMinutes=minutes;
    await persistConfig();
    timerWarningShown=false;
    const pin=cfg.pinHash?prompt(uiText.pinTitle||'PIN eingeben'):'';
    const r=await fetch('/api/timer/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:pin||'',minutes:minutes})});
    const data=await r.json();
    if(data.valid){
      btn.textContent=uiText.timerStop;
      document.getElementById('timerStatus').textContent=uiText.timerActive;
      pollTimer();
    }
  }
}
async function extendFromBlock(minutes){
  const pin=document.getElementById('timerBlockPin').value;
  const r=await fetch('/api/timer/extend',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:pin,minutes:minutes})});
  const data=await r.json();
  if(data.valid){
    timerWarningShown=false;
    hideTimerBlock();
    pollTimer();
  }else{
    document.getElementById('timerBlockErr').textContent=uiText.timerWrongPin||'Falscher PIN';
    document.getElementById('timerBlockPin').value='';
    document.getElementById('timerBlockPin').focus();
  }
}

// Touch swipe
let touchStartX=0, touchStartY=0;
document.addEventListener('touchstart',function(e){
  if(e.touches.length!==1) return;
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
},false);
document.addEventListener('touchend',function(e){
  if(!touchStartX && !touchStartY) return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  touchStartX=0; touchStartY=0;
  if(Math.abs(dx)<50 || Math.abs(dy)>Math.abs(dx)) return;
  if(document.getElementById('admin').classList.contains('hidden') && !document.getElementById('pin').classList.contains('hidden')) return;
  if(dx>0) changePage(-1); else changePage(1);
},false);

// Clock
function clockEmoji(h){
  if(h>=5 && h<11) return '🌅';
  if(h>=11 && h<17) return '☀️';
  if(h>=17 && h<21) return '🌇';
  return '🌙';
}
function updateClock(){
  const now=new Date();
  const h=now.getHours();
  const m=String(now.getMinutes()).padStart(2,'0');
  const badge=document.getElementById('clockBadge');
  badge.textContent=clockEmoji(h)+' '+h+':'+m;
}
setInterval(updateClock,30000);
updateClock();

// Battery
async function updateBattery(){
  const badge=document.getElementById('batteryBadge');
  if(!navigator.getBattery) return;
  try{
    const bat=await navigator.getBattery();
    const pct=Math.round(bat.level*100);
    let icon='🔋';
    if(bat.charging) icon='⚡';
    else if(pct<=20) icon='🪫';
    badge.style.display='flex';
    badge.textContent=icon+' '+pct+'%';
    bat.addEventListener('levelchange',updateBattery);
    bat.addEventListener('chargingchange',updateBattery);
  }catch(e){}
}
updateBattery();

// Live preview
function renderPreview(){
  const panel=document.getElementById('previewPanel');
  const grid=document.getElementById('previewGrid');
  if(document.getElementById('admin').classList.contains('hidden')){
    panel.classList.add('hidden');
    return;
  }
  panel.classList.remove('hidden');
  grid.innerHTML='';
  const visible=cfg.tiles.filter(t=>t.visible);
  const size=cfg.layoutMode==='klein'?9:4;
  grid.className='preview-grid '+(cfg.layoutMode||'gross');
  for(let i=0;i<Math.min(size,visible.length);i++){
    const t=visible[i];
    const el=document.createElement('div');
    el.className='preview-tile';
    el.textContent=t.emoji||'✨';
    grid.appendChild(el);
  }
}

async function saveConfig(){
  cfg.title=document.getElementById('cfgTitle').value;
  cfg.theme=document.getElementById('cfgTheme').value;
  cfg.layoutMode=document.getElementById('cfgLayoutMode').value;
  cfg.parentLabel=document.getElementById('cfgParentLabel').value;
  cfg.exitLabel=document.getElementById('cfgExitLabel').value;
  let minutes=parseInt(document.getElementById('cfgTimerMinutes').value,10);
  if(isNaN(minutes)||minutes<=0){
    minutes=parseInt(document.getElementById('cfgTimerCustom').value,10)||0;
  }
  cfg.timerMinutes=minutes;
  cfg.timerWarningMinutes=cfg.timerWarningMinutes||5;
  cfg.currentPage=0;
  await persistConfig();
  renderAll();
  closeAdmin();
}
async function exportConfig(){
  const r=await fetch('/api/export-config');
  const blob=await r.blob();
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='cozy-kids-config.json';
  a.click();
  URL.revokeObjectURL(url);
}
async function importConfig(input){
  const msg=document.getElementById('importMsg');
  msg.textContent='';
  msg.style.color='';
  if(!input.files||!input.files[0]) return;
  if(!window.confirm(uiText.importConfirm||'This will overwrite all settings. Continue?')){ input.value=''; return; }
  try{
    const text=await input.files[0].text();
    const data=JSON.parse(text);
    const r=await fetch('/api/import-config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    const result=await r.json();
    if(result.status==='ok'){
      msg.textContent=uiText.importSuccess||'Config imported';
      msg.style.color='green';
      await loadConfig();
      renderAll();
    }else{
      msg.textContent=result.message||(uiText.importError||'Import failed');
      msg.style.color='#c00';
    }
  }catch(e){
    msg.textContent=uiText.invalidConfig||'Invalid config file';
    msg.style.color='#c00';
  }
  input.value='';
}
(async()=>{ await loadApps(); await loadRecommendations(); await loadFeatures(); await loadConfig(); await autoScanRecommendations(); await pollTimer(); timerPollInterval=setInterval(pollTimer,10000); })();
</script>
