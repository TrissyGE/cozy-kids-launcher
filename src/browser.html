<!doctype html>
<html lang="{{ACTIVE_LANG}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{APP_NAME}}</title>
<style>
  * { box-sizing:border-box; }
  body { margin:0; overflow:hidden; font-family:system-ui,sans-serif; background:#000; }
  iframe { width:100vw; height:100vh; border:none; display:block; }
  #backBtn {
    position:fixed; top:14px; left:14px; z-index:9999;
    width:90px; height:90px; border:0; border-radius:24px;
    background:rgba(255,255,255,.92); box-shadow:0 8px 24px rgba(0,0,0,.25);
    font-size:2.4rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:transform .15s ease;
  }
  #backBtn:active { transform:scale(.92); }
  #timerBadge { position:fixed; top:14px; right:14px; z-index:9999; background:rgba(255,255,255,.92); border-radius:16px; padding:8px 16px; font-weight:700; font-size:1.1rem; color:#333; box-shadow:0 8px 24px rgba(0,0,0,.25); display:none; }
  #timerBadge.warning { background:#fff3e0; color:#e65100; }
  #timerBadge.expired { background:#ffebee; color:#c00; }
  .timeroverlay { position:fixed; inset:0; background:rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; z-index:10000; }
  .timerbox { background:white; border-radius:24px; padding:32px; max-width:420px; width:90%; box-shadow:0 8px 24px rgba(0,0,0,.25); text-align:center; }
  .timerbox h2 { margin:0 0 12px; }
  .timerbox .emoji { font-size:3rem; }
  #backLabel {
    position:fixed; top:108px; left:14px; z-index:9999;
    background:rgba(255,255,255,.88); padding:4px 10px; border-radius:10px;
    font-weight:700; font-size:.85rem; color:#333; pointer-events:none;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
  }
  .hidden { display:none !important; }
</style>
</head>
<body>
<button id="backBtn" onclick="goHome()" title="{{LABEL_BACK}}">🏠</button>
<span id="backLabel">{{LABEL_BACK}}</span>
<div id="timerBadge"></div>
<iframe id="frame" src="" sandbox="allow-scripts allow-same-origin allow-forms allow-top-navigation allow-downloads allow-presentation" allow="fullscreen; autoplay; encrypted-media; picture-in-picture"></iframe>
<div id="timerWarning" class="timeroverlay hidden">
  <div class="timerbox">
    <div class="emoji">⏰</div>
    <h2 id="timerWarningTitle"></h2>
    <div style="color:#666;">{{TIMER_WARNING_TEXT}}</div>
  </div>
</div>
<div id="timerBlock" class="timeroverlay hidden">
  <div class="timerbox">
    <div class="emoji">⏰</div>
    <h2>{{TIMER_EXPIRED_TITLE}}</h2>
    <p>{{TIMER_EXPIRED_BODY}}</p>
    <input id="timerBlockPin" type="password" inputmode="numeric" maxlength="6" placeholder="{{PIN_PLACEHOLDER}}">
    <div id="timerBlockErr" style="color:#c00; font-weight:600; min-height:24px;"></div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:12px;">
      <button style="border:0; border-radius:18px; padding:10px 18px; font-size:1rem; font-weight:700; background:#e85a9c; color:#fff; cursor:pointer;" onclick="extendFromBlock(15)">+15</button>
      <button style="border:0; border-radius:18px; padding:10px 18px; font-size:1rem; font-weight:700; background:#e85a9c; color:#fff; cursor:pointer;" onclick="extendFromBlock(30)">+30</button>
      <button style="border:0; border-radius:18px; padding:10px 18px; font-size:1rem; font-weight:700; background:#e85a9c; color:#fff; cursor:pointer;" onclick="extendFromBlock(60)">+60</button>
    </div>
    <div style="margin-top:12px;">
      <button style="border:0; border-radius:18px; padding:10px 18px; font-size:1rem; font-weight:700; background:#fff7fb; color:#333; cursor:pointer;" onclick="goHome()">{{TIMER_EXIT}}</button>
    </div>
  </div>
</div>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  const url = params.get('url');
  const label = params.get('label') || '';
  if (!url) {
    document.getElementById('frame').style.display = 'none';
    document.body.innerHTML += '<div style="color:white;text-align:center;padding-top:40vh;font-size:1.5rem;">No URL provided</div>';
    return;
  }
  // Only allow http: and https: protocols
  try {
    const u = new URL(url);
    if (u.protocol !== 'http:' && u.protocol !== 'https:') {
      throw new Error('Invalid protocol');
    }
  } catch (e) {
    document.getElementById('frame').style.display = 'none';
    document.body.innerHTML += '<div style="color:white;text-align:center;padding-top:40vh;font-size:1.5rem;">Invalid URL</div>';
    return;
  }
  document.getElementById('frame').src = url;
  if (label) {
    document.getElementById('backLabel').textContent = label;
  }
})();
function goHome() { window.location.href = '/index.html'; }

// Timer support
function formatTime(sec){
  const m=Math.floor(sec/60);
  const s=sec%60;
  return m+':'+String(s).padStart(2,'0');
}
async function pollTimer(){
  try{
    const r=await fetch('/api/timer/status');
    const data=await r.json();
    const badge=document.getElementById('timerBadge');
    if(data.active){
      badge.style.display='block';
      badge.textContent='⏱️ '+formatTime(data.remainingSeconds);
      if(data.expired){
        badge.className='expired';
        badge.textContent='⏰ {{TIMER_EXPIRED}}';
        showTimerBlock();
      }else if(data.warning){
        badge.className='warning';
        showTimerWarning(data.remainingSeconds);
      }else{
        badge.className='';
        hideTimerWarning();
      }
    }else{
      badge.style.display='none';
      hideTimerWarning();
      hideTimerBlock();
    }
  }catch(e){}
}
function showTimerWarning(remaining){
  const el=document.getElementById('timerWarning');
  if(!el.classList.contains('hidden')) return;
  document.getElementById('timerWarningTitle').textContent='{{TIMER_WARNING_TITLE}}'.replace('{time}',formatTime(remaining));
  el.classList.remove('hidden');
  setTimeout(hideTimerWarning,6000);
}
function hideTimerWarning(){ document.getElementById('timerWarning').classList.add('hidden'); }
function showTimerBlock(){ document.getElementById('timerBlock').classList.remove('hidden'); }
function hideTimerBlock(){ document.getElementById('timerBlock').classList.add('hidden'); document.getElementById('timerBlockPin').value=''; document.getElementById('timerBlockErr').textContent=''; }
async function extendFromBlock(minutes){
  const pin=document.getElementById('timerBlockPin').value;
  const r=await fetch('/api/timer/extend',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:pin,minutes:minutes})});
  const data=await r.json();
  if(data.valid){
    hideTimerBlock();
  }else{
    document.getElementById('timerBlockErr').textContent='{{TIMER_WRONG_PIN}}';
    document.getElementById('timerBlockPin').value='';
    document.getElementById('timerBlockPin').focus();
  }
}
pollTimer();
setInterval(pollTimer,10000);
</script>
</body>
</html>
